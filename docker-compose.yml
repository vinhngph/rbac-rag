services:
  database:
    image: dhi.io/postgres:18-alpine3.22-dev
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - database-volume:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  database_migrator:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      database:
        condition: service_healthy
    command: [ "alembic", "upgrade", "head" ]

  vector_database:
    image: docker.io/qdrant/qdrant
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - vector_database-volume:/qdrant/storage

  ollama:
    image: docker.io/ollama/ollama
    ports:
      - "11434:11434"
    devices:
      - "nvidia.com/gpu=all"
    volumes:
      - ollama-volume:/root/.ollama

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - storage-volume:/app/storage
      - huggingface-volume:/root/.cache/huggingface/hub/
    devices:
      - "nvidia.com/gpu=all"
    depends_on:
      - database
      - database_migrator
      - vector_database
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:8080"

volumes:
  database-volume:
  vector_database-volume:
  ollama-volume:
  huggingface-volume:
  storage-volume:
